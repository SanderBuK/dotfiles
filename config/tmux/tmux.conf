# Fix colors for nvim
set-option -sa terminal-overrides ",xterm*:Tc"

# Pass OSC-8 hyperlinks through to the outer terminal
set -as terminal-features ',*:hyperlinks'

# Detach when writing exit
set -g detach-on-destroy on

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind v copy-mode

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# In case you want to use mouse
set -g mouse on

# Navigation with vi keys
setw -g mode-keys vi

# Use v and y for highlight and copy
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Split pane and window in cwd
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Dismiss Claude waiting indicator for current window
bind Escape run-shell "rm -f /tmp/claude-waiting/$(tmux display-message -p '#{session_name}_#{window_id}') && tmux refresh-client -S"

# Session navigation (refresh-client forces immediate status update)
bind -n M-j switch-client -p \; refresh-client
bind -n M-k switch-client -n \; refresh-client

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-processes 'nvim claude'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-hook-post-save-layout '~/.config/tmux/scripts/resurrect-claude-save.sh'

run '~/.config/tmux/plugins/tpm/tpm'

set -g status-position bottom

# Session list embedded in catppuccin's status-left
# Must come AFTER tpm/plugins to override catppuccin's status-left
set -g status-left-length 200
set -g status-left '#(~/.config/tmux/scripts/session-bar.sh)'
set -g status-interval 2

# Window indicator: pill turns red with ● when Claude is waiting,
# and green with " COPY" while in copy-mode (visual mode)
set -g window-status-format '#(~/.config/tmux/scripts/window-status.sh "#{session_name}" "#{window_index}" "#{window_name}" "#{pane_current_path}" 0 "#{window_id}" "#{pane_in_mode}" "#{pane_current_command}")'
set -g window-status-current-format '#(~/.config/tmux/scripts/window-status.sh "#{session_name}" "#{window_index}" "#{window_name}" "#{pane_current_path}" 1 "#{window_id}" "#{pane_in_mode}" "#{pane_current_command}")'

# Right side: COPY mode badge (instant) | CPU load | RAM | Battery
set -g status-right "#{?pane_in_mode,#[bg=#a6e3a1#,fg=#1e1e2e#,bold] COPY MODE #[default],}#(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)#[bg=#f9e2af,fg=#1e1e2e] 󰍛 #(cut -d' ' -f1 /proc/loadavg) #[bg=#89b4fa,fg=#1e1e2e] 󰘚 #(free -h | awk '/^Mem:/{print \$3\"/\"\$2}') #(~/.config/tmux/scripts/battery.sh)"
set -g status-right-length 120

